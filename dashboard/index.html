<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agora Prediction Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d12;
  --bg2:#14141d;
  --bg3:#1c1c2a;
  --border:#2a2a3e;
  --text:#d0d0e0;
  --muted:#606080;
  --green:#22c55e;
  --green-bg:rgba(34,197,94,.08);
  --red:#ef4444;
  --red-bg:rgba(239,68,68,.08);
  --yellow:#eab308;
  --blue:#3b82f6;
  --purple:#a855f7;
  --cyan:#06b6d4;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;line-height:1.5;overflow:hidden;height:100vh}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);gap:12px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--text)}
.topbar-title span{color:var(--muted);font-weight:400}
.status-badge{display:flex;align-items:center;gap:5px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.running{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.idle{background:var(--green)}
.status-dot.stopped{background:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:6px}
.btn{padding:4px 12px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--mono);cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text);text-transform:uppercase;letter-spacing:.5px;transition:all .15s}
.btn:hover{background:var(--bg2);border-color:var(--muted)}
.btn-start{border-color:var(--green);color:var(--green)}
.btn-start:hover{background:var(--green-bg)}
.btn-stop{border-color:var(--red);color:var(--red)}
.btn-stop:hover{background:var(--red-bg)}
.btn-cycle{color:var(--blue);border-color:var(--blue)}
.btn-cycle:hover{background:rgba(59,130,246,.08)}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:2fr 1fr;grid-template-rows:auto auto 1fr;height:calc(100vh - 37px)}
.layout>*{min-height:0}

/* ── Metric row ── */
.metrics{grid-column:1/2;display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.metric{background:var(--bg2);padding:10px 14px}
.metric-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:2px}
.metric-value{font-size:18px;font-weight:700}
.metric-value.green{color:var(--green)}
.metric-value.blue{color:var(--blue)}
.metric-value.purple{color:var(--purple)}
.metric-value.yellow{color:var(--yellow)}
.metric-sub{font-size:9px;color:var(--muted);margin-top:1px}

/* ── Cycle bar ── */
.cycle-bar{grid-column:1/2;background:var(--bg2);border-bottom:1px solid var(--border);padding:0;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--muted);min-height:0;flex-shrink:0;height:24px}
.cycle-bar-inner{display:flex;align-items:center;gap:8px;padding:0 14px;width:100%}
.cycle-status{color:var(--text);flex-shrink:0}
.cycle-progress{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:right}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.cycle-active{color:var(--green)}
.cycle-active .cycle-status{color:var(--green);animation:pulse 1.5s ease-in-out infinite}

/* ── Panels: left = feed, right = logs ── */
.feed{grid-column:1/2;grid-row:3/4;overflow-y:auto;padding:8px 14px}
.feed-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:0 0 4px 0;border-bottom:1px solid var(--border)}
.feed-header .count{color:var(--text)}
.feed-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:11px;gap:6px;opacity:.5}
.feed-empty .big{font-size:24px}

/* ── Decision row ── */
.decision{display:grid;grid-template-columns:auto auto 1fr auto auto auto;gap:6px;align-items:center;padding:6px 8px;margin-bottom:3px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;font-size:11px;cursor:default;transition:border-color .15s}
.decision:hover{border-color:var(--muted)}
.decision .dir{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.decision .dir.yes{background:var(--green-bg);color:var(--green)}
.decision .dir.no{background:var(--red-bg);color:var(--red)}
.decision .q{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.decision .ev-tag{font-size:10px;padding:1px 5px;border-radius:3px;white-space:nowrap;min-width:55px;text-align:right}
.decision .ev-tag.pos{color:var(--green);background:var(--green-bg)}
.decision .ev-tag.neg{color:var(--red);background:var(--red-bg)}
.decision .bet-size{font-size:10px;color:var(--yellow);white-space:nowrap;min-width:50px;text-align:right}
.decision .ts{font-size:9px;color:var(--muted);white-space:nowrap;min-width:60px;text-align:right}

/* ── Sidebar: logs ── */
.sidebar{grid-column:2/3;grid-row:1/4;background:var(--bg);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.sidebar-header .actions{display:flex;gap:6px}
.sidebar-header button{font-size:9px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--mono);padding:2px 4px}
.sidebar-header button:hover{color:var(--text)}
.log-stream{flex:1;overflow-y:auto;padding:4px 10px;font-size:10px;line-height:1.5}
.log-line{color:var(--muted);white-space:pre-wrap;word-break:break-all;padding:1px 0}
.log-line.info{color:var(--muted)}
.log-line.success{color:var(--green)}
.log-line.warn{color:var(--yellow)}
.log-line.error{color:var(--red)}
.log-line.bold{color:var(--text);font-weight:600}
.job-link{font-size:9px;color:var(--cyan);cursor:pointer;text-decoration:none;padding:1px 4px;border:1px solid var(--cyan);border-radius:3px;margin-left:4px}
.job-link:hover{background:var(--cyan);color:#000}

/* ── Scroll ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Responsive ── */
@media(max-width:800px){
  .layout{grid-template-columns:1fr}
  .sidebar{grid-column:1/2;grid-row:4/5;border-left:none;border-top:1px solid var(--border);max-height:200px}
  .metrics{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:600px){
  .metrics{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">AGORA <span>#19687</span></div>
    <div class="status-badge">
      <span class="status-dot stopped" id="statusDot"></span>
      <span id="statusText">STOPPED</span>
    </div>
    <span id="modeBadge" style="font-size:8px;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;border:1px solid var(--yellow);color:var(--yellow)">DRY RUN</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-cycle" id="btnCycle">▶ Cycle</button>
    <button class="btn btn-stop" id="btnStop">■ Stop</button>
    <button class="btn" id="btnRefresh">↻</button>
  </div>
</div>

<div class="layout">
  <!-- Metrics -->
  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Bankroll</div>
      <div class="metric-value green" id="bankroll">$0.00</div>
      <div class="metric-sub" id="walletAddr">not connected</div>
    </div>
    <div class="metric">
      <div class="metric-label">Bets</div>
      <div class="metric-value blue" id="betsPlaced">0</div>
      <div class="metric-sub" id="totalWagered">$0 wagered</div>
    </div>
    <div class="metric">
      <div class="metric-label">Avg EV</div>
      <div class="metric-value purple" id="avgEv">—</div>
      <div class="metric-sub" id="bestEv">best: —</div>
    </div>
    <div class="metric">
      <div class="metric-label">Accuracy</div>
      <div class="metric-value" id="accuracyRate" style="color:var(--muted)">—</div>
      <div class="metric-sub" id="accuracyDetail">0 resolved</div>
    </div>
    <div class="metric">
      <div class="metric-label">Scanned</div>
      <div class="metric-value yellow" id="marketsScanned">0</div>
      <div class="metric-sub" id="cyclesCompleted">0 cycles</div>
    </div>
    <div class="metric">
      <div class="metric-label">Block</div>
      <div class="metric-value" style="color:var(--muted);font-size:14px" id="blockNumber">—</div>
      <div class="metric-sub" id="networkName">Arc Testnet</div>
    </div>
    <div class="metric">
      <div class="metric-label">Reputation</div>
      <div class="metric-value" style="color:var(--purple);font-size:18px" id="reputationScore">—</div>
      <div class="metric-sub" id="reputationDetail">agent #—</div>
    </div>
  </div>

  <!-- Cycle bar -->
  <div class="cycle-bar" id="cycleBar">
    <div class="cycle-bar-inner">
      <span class="cycle-status" id="cycleStatus">Idle</span>
      <span class="cycle-progress" id="cycleProgress">Click Cycle to start analysis</span>
    </div>
  </div>

  <!-- Decision feed -->
  <div class="feed" id="feed">
    <div class="feed-header">
      <span>Decisions</span>
      <span class="count" id="decisionCount">0</span>
    </div>
    <div class="feed-empty" id="feedEmpty">
      <div class="big">⏳</div>
      <div>No decisions yet</div>
      <div>Press <b>Cycle</b> to run analysis</div>
    </div>
    <div id="feedList"></div>
  </div>

  <!-- Log sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Logs</span>
      <div class="actions">
        <button id="btnAutoScroll" title="Toggle auto-scroll">↧</button>
        <button onclick="clearLogs()">clear</button>
      </div>
    </div>
    <div class="log-stream" id="logStream">
      <div class="log-line muted" style="color:var(--muted)">Waiting...</div>
    </div>
  </div>
</div>

<script>
const API = '/api';
let autoScroll = true;
let prevDecisionKeys = new Set();
let lastDecisionCount = 0;
let pollTimer;

//── SSE ──
function connectSSE(){
  const es = new EventSource(API+'/logs/stream');
  es.onmessage = e => { try { appendLog(JSON.parse(e.data)) } catch {} };
  es.onerror = () => {};
}

function appendLog(entry){
  const el = document.getElementById('logStream');
  const ph = el.querySelector('.log-line.muted');
  if(ph) ph.remove();
  const line = document.createElement('div');
  line.className = 'log-line ' + (entry.level||'info');
  const t = new Date(entry.timestamp).toLocaleTimeString();
  line.textContent = `[${t}] ${entry.message}`;
  el.appendChild(line);
  if(autoScroll) el.scrollTop = el.scrollHeight;
}

function addLog(msg, lv='info'){
  appendLog({ timestamp: new Date().toISOString(), level: lv, message: msg });
}

function clearLogs(){
  document.getElementById('logStream').innerHTML = '<div class="log-line muted" style="color:var(--muted)">Cleared</div>';
}

//── Fetch ──
async function refreshAll(){
  const [s,w,m,d,r] = await Promise.all([
    fetchJSON(API+'/status'),
    fetchJSON(API+'/wallet'),
    fetchJSON(API+'/metrics'),
    fetchJSON(API+'/decisions'),
    fetchJSON(API+'/reputation'),
  ]);
  if(s) renderStatus(s);
  if(w) renderWallet(w);
  if(m) renderMetrics(m);
  if(d) renderDecisions(d);
  if(r) renderReputation(r);
}

async function fetchJSON(url){
  try { const r = await fetch(url); return await r.json() } catch { return null }
}

//── Render ──
function renderStatus(s){
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + s.status;
  txt.textContent = s.status.toUpperCase();

  // Mode badge
  const modeEl = document.getElementById('modeBadge');
  if(s.mode === 'live'){
    modeEl.textContent = 'LIVE';
    modeEl.style.borderColor = 'var(--green)';
    modeEl.style.color = 'var(--green)';
  } else {
    modeEl.textContent = 'DRY RUN';
    modeEl.style.borderColor = 'var(--yellow)';
    modeEl.style.color = 'var(--yellow)';
  }

  document.getElementById('cyclesCompleted').textContent = (s.cyclesCompleted||0) + ' cycles';

  const bar = document.getElementById('cycleBar');
  const cs = document.getElementById('cycleStatus');
  const cp = document.getElementById('cycleProgress');
  bar.className = 'cycle-bar';
  if(s.status === 'running' || s.status === 'started'){
    bar.classList.add('cycle-active');
    cs.textContent = '▶ RUNNING';
    cp.textContent = 'Cycle in progress...';
  } else if(s.lastCycle){
    cs.textContent = '✓ IDLE';
    const nextStr = s.nextCycleAt ? ' | Next: ' + new Date(s.nextCycleAt).toLocaleTimeString() : '';
    cp.textContent = 'Last: ' + new Date(s.lastCycle.timestamp).toLocaleTimeString() + ' | ' + (s.lastCycle.betsExecuted||0) + ' bets' + nextStr;
  } else {
    cs.textContent = '⏸ IDLE';
    cp.textContent = 'Press Cycle to start';
  }
}

function renderWallet(w){
  if(!w) return;
  document.getElementById('walletAddr').textContent = (w.walletAddress||'not connected').substring(0,10)+'...';
  document.getElementById('blockNumber').textContent = w.blockNumber||'—';
  document.getElementById('networkName').textContent = 'Arc Testnet';
}

function renderReputation(r){
  if(!r) return;
  const el = document.getElementById('reputationScore');
  const det = document.getElementById('reputationDetail');
  if(r.agentId && r.score !== null && r.score !== undefined){
    el.textContent = r.score;
    det.textContent = 'agent #' + r.agentId + ' | ' + (r.feedbackCount||0) + ' feedbacks';
    el.style.color = r.score >= 50 ? 'var(--green)' : r.score > 0 ? 'var(--yellow)' : 'var(--red)';
  } else {
    el.textContent = '—';
    det.textContent = r.agentId
      ? 'agent #' + r.agentId + ' | score view unavailable'
      : 'not registered';
  }
}

function renderMetrics(m){
  if(!m) return;
  document.getElementById('bankroll').textContent = '$' + (m.bankrollRemaining||'0.00');
  document.getElementById('betsPlaced').textContent = m.totalBetsPlaced||0;
  document.getElementById('totalWagered').textContent = '$' + (m.totalWageredUsdc||'0') + ' wagered';
  document.getElementById('marketsScanned').textContent = m.opportunitiesScanned||0;

  const avg = document.getElementById('avgEv');
  if(m.avgEvPercent && m.avgEvPercent !== '0.00'){
    avg.textContent = m.avgEvPercent + '%';
    avg.style.color = 'var(--green)';
  } else {
    avg.textContent = '—';
  }

  const best = document.getElementById('bestEv');
  if(m.bestEvPercent && m.bestEvPercent !== '0.00'){
    best.textContent = 'best: ' + m.bestEvPercent + '%';
  } else {
    best.textContent = 'best: —';
  }

  const accEl = document.getElementById('accuracyRate');
  const accDet = document.getElementById('accuracyDetail');
  if(m.accuracyRate && m.accuracyRate !== 'N/A'){
    accEl.textContent = m.accuracyRate;
    accEl.style.color = parseFloat(m.accuracyRate) >= 50 ? 'var(--green)' : 'var(--red)';
  } else {
    accEl.textContent = '—';
    accEl.style.color = 'var(--muted)';
  }
  accDet.textContent = (m.correct||0) + '/' + (m.resolved||0) + ' correct';
}

function renderDecisions(d){
  if(!d) return;
  const count = d.count || 0;
  document.getElementById('decisionCount').textContent = count;

  if(count === 0){
    document.getElementById('feedEmpty').style.display = 'flex';
    document.getElementById('feedList').innerHTML = '';
    return;
  }
  document.getElementById('feedEmpty').style.display = 'none';

  // Only re-render on new data
  if(count === lastDecisionCount) return;
  lastDecisionCount = count;

  const list = document.getElementById('feedList');
  list.innerHTML = d.decisions.map(d => renderDecision(d)).join('');
}

function renderDecision(d){
  const dirCls = d.direction === 'YES' ? 'yes' : 'no';
  const evNum = d.ev || 0;
  const evPct = (evNum * 100).toFixed(1);
  const evCls = evNum > 0 ? 'pos' : 'neg';
  const title = escHtml(d.marketQuestion || 'Unknown').substring(0, 55);
  const sz = d.size || 0;
  const ts = new Date(d.timestamp).toLocaleTimeString();
  const jobLink = d.jobId
    ? `<a class="job-link" href="https://testnet.arcscan.app/tx/${d.jobCreateTx || d.txHash}" target="_blank" title="Job #${d.jobId} create tx">ERC-8183</a>`
    : '';
  const repLink = d.jobId
    ? `<a class="job-link" href="https://testnet.arcscan.app/address/0x8004B663056A597Dffe9eCcC1965A193B7388713?tab=txs" target="_blank" title="ERC-8004 ReputationRegistry transactions" style="border-color:var(--purple);color:var(--purple)">ERC-8004</a>`
    : '';
  const resolvedTag = d.resolved
    ? `<span style="font-size:8px;padding:1px 4px;border-radius:2px;background:${d.resolvedCorrectly ? 'var(--green-bg)' : 'var(--red-bg)'};color:${d.resolvedCorrectly ? 'var(--green)' : 'var(--red)'}">${d.resolvedCorrectly ? '✓' : '✗'}</span>`
    : '';
  return `<div class="decision">
    <span class="dir ${dirCls}">${d.direction}</span>
    <span class="ev-tag ${evCls}">${evPct}%</span>
    <span class="q" title="${escHtml(d.marketQuestion||'')}">${title}</span>
    <span class="bet-size">${sz > 0 ? '$'+sz.toFixed(2) : '—'}</span>
    <span class="ts">${ts}</span>
    ${jobLink}
    ${repLink}
    ${resolvedTag}
  </div>`;
}

function escHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

//── Cycle bar updates from decisions ──
function watchDecisions(){
  setInterval(async () => {
    try {
      const r = await fetch(API+'/decisions');
      const data = await r.json();
      const keys = new Set();
      for(const d of data.decisions){
        const k = d.timestamp + d.marketQuestion;
        keys.add(k);
        if(!prevDecisionKeys.has(k)){
          const ev = (d.ev * 100).toFixed(1);
          const dir = d.direction;
          addLog(`${dir} $${(d.size||0).toFixed(2)} — "${(d.marketQuestion||'').substring(0,45)}" (EV ${ev}%)`, 'success');
          // update cycle bar
          const cs = document.getElementById('cycleStatus');
          const cp = document.getElementById('cycleProgress');
          cs.textContent = '✓ DECISION';
          cp.textContent = `${dir} $${(d.size||0).toFixed(2)} — ${(d.marketQuestion||'').substring(0,40)}`;
        }
      }
      prevDecisionKeys = keys;
    } catch {}
  }, 3000);
}

//── Actions ──
document.getElementById('btnCycle').addEventListener('click', async () => {
  const cs = document.getElementById('cycleStatus');
  const cp = document.getElementById('cycleProgress');
  const bar = document.getElementById('cycleBar');
  bar.className = 'cycle-bar cycle-active';
  cs.textContent = '▶ SCANNING';
  cp.textContent = 'Fetching markets...';
  addLog('Starting cycle...', 'bold');
  try {
    const r = await fetch(API+'/start', { method: 'POST' });
    const data = await r.json();
    addLog(data.message || 'Cycle started', 'success');
  } catch(e){
    addLog('Failed: '+e.message, 'error');
    bar.className = 'cycle-bar';
    cs.textContent = '✗ FAILED';
    cp.textContent = 'Error starting cycle';
  }
});

document.getElementById('btnStop').addEventListener('click', async () => {
  addLog('Stopping...', 'warn');
  try {
    await fetch(API+'/stop', { method: 'POST' });
    addLog('Stopped', 'warn');
  } catch(e){
    addLog('Stop failed: '+e.message, 'error');
  }
});

document.getElementById('btnRefresh').addEventListener('click', refreshAll);

document.getElementById('btnAutoScroll').addEventListener('click', () => {
  autoScroll = !autoScroll;
  const btn = document.getElementById('btnAutoScroll');
  btn.style.opacity = autoScroll ? '1' : '.4';
  if(autoScroll){
    const el = document.getElementById('logStream');
    el.scrollTop = el.scrollHeight;
  }
});

//── Init ──
connectSSE();
refreshAll();
watchDecisions();
setInterval(refreshAll, 5000);
</script>
</body>
</html>
